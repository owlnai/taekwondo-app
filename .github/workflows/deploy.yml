name: Build and Push Monolith Docker Image

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version from tabstash.dev/package.json
        id: version
        run: |
          VERSION=$(jq -r .version tabstash.dev/package.json)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "version_tag=v${VERSION}" >> $GITHUB_OUTPUT
          echo "Version: $VERSION"

      - name: Check if version tag exists
        id: version_check
        run: |
          VERSION_TAG="${{ steps.version.outputs.version_tag }}"
          if git rev-parse "$VERSION_TAG" >/dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "Tag $VERSION_TAG already exists"
          else
            echo "exists=false" >> $GITHUB_OUTPUT
            echo "Tag $VERSION_TAG does not exist, will create release"
          fi

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata (for tags)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest
            type=raw,value=${{ steps.version.outputs.version }}
            type=raw,value=${{ steps.version.outputs.version_tag }}
            type=raw,value=main-${{ github.sha }}
          labels: |
            org.opencontainers.image.version=${{ steps.version.outputs.version }}
            org.opencontainers.image.revision=${{ github.sha }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Generate release notes
        if: steps.version_check.outputs.exists == 'false'
        id: release_notes
        run: |
          PREVIOUS_TAG=$(git tag --sort=-creatordate --list "v*" | sed -n '2p' || echo "")
          if [ -n "$PREVIOUS_TAG" ]; then
            NOTES=$(git log ${PREVIOUS_TAG}..HEAD --pretty=format:"- %s (%h)" --no-merges 2>/dev/null || echo "- Initial release")
          else
            NOTES=$(git log --pretty=format:"- %s (%h)" --no-merges -20)
          fi
          {
            echo 'notes<<EOF'
            echo "## Release ${{ steps.version.outputs.version_tag }}"
            echo ""
            echo "### What's Changed"
            echo "$NOTES"
            echo ""
            echo "### Docker Image"
            echo "\`ghcr.io/${{ github.repository }}:${{ steps.version.outputs.version }}\`"
            echo 'EOF'
          } >> $GITHUB_OUTPUT

      - name: Create Git Tag
        if: steps.version_check.outputs.exists == 'false'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "${{ steps.version.outputs.version_tag }}" -m "Release ${{ steps.version.outputs.version_tag }}"
          git push origin "${{ steps.version.outputs.version_tag }}"

      - name: Create GitHub Release
        if: steps.version_check.outputs.exists == 'false'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.version.outputs.version_tag }}
          name: Release ${{ steps.version.outputs.version_tag }}
          body: ${{ steps.release_notes.outputs.notes }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Trigger Dokploy deployment
        if: success()
        run: |
          curl -X POST "https://cloud.afor.digital/api/deploy/H5xQVnVzuERm69ErUU7qe" \
            -H "Content-Type: application/json" \
            -w "\nHTTP Status: %{http_code}\n" \
            --fail-with-body
